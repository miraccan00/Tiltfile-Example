name: CI — Build & Push with go-semver

on:
  push:
    branches:
      - main
    paths-ignore:
      - "VERSION"   # prevent recursive runs from the version bump commit
  pull_request:
    branches:
      - main
    paths-ignore:
      - "VERSION"

permissions:
  contents: write   # needed to commit back the bumped VERSION file
  packages: write   # needed to push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: miraccan00/tiltfile-example

jobs:
  version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      version:     ${{ steps.semver.outputs.version }}
      full_semver: ${{ steps.semver.outputs.full_semver }}
      short_sha:   ${{ steps.semver.outputs.short_sha }}
      branch:      ${{ steps.semver.outputs.branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # REQUIRED — go-semver reads the full git log

      - name: Run go-semver
        id: semver
        run: |
          VERSION_JSON=$(docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/miraccan00/go-semver:master)

          echo "version=$(echo $VERSION_JSON     | jq -r '.MajorMinorPatch')"   >> $GITHUB_OUTPUT
          echo "full_semver=$(echo $VERSION_JSON | jq -r '.FullSemVer')"        >> $GITHUB_OUTPUT
          echo "short_sha=$(echo $VERSION_JSON   | jq -r '.ShortSha')"          >> $GITHUB_OUTPUT
          echo "branch=$(echo $VERSION_JSON      | jq -r '.EscapedBranchName')" >> $GITHUB_OUTPUT

          DIRTY=$(echo "$VERSION_JSON" | jq '.UncommittedChanges')
          if [ "$DIRTY" -gt 0 ]; then
            echo "ERROR: $DIRTY uncommitted change(s) detected."
            exit 1
          fi

      - name: Commit bumped VERSION back
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.semver.outputs.version }} [skip ci]"
          git push

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: []   # runs in parallel with version job
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [version, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # APP_VERSION is set at runtime via k8s env — no build-arg needed
          labels: |
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.revision=${{ needs.version.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
